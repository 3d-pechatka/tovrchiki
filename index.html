<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Магазин</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0f172a; /* Темный фон */
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Список товаров */
        .gallery { width: 100%; max-width: 400px; }

        .card {
            background: #1e293b;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #334155;
        }

        .card img { width: 100%; display: block; aspect-ratio: 1/1; object-fit: cover; }

        .info { padding: 15px; display: flex; justify-content: space-between; font-weight: bold; }

        /* Всплывающее окно */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-content { width: 90%; max-width: 400px; text-align: center; }

        #bigImage { width: 100%; border-radius: 15px; border: 2px solid #38bdf8; }

        /* Кнопки цветов */
        .colors { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }

        .dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid white; }

        .close { margin-top: 30px; color: #94a3b8; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <h1>Ассортимент</h1>

    <div class="gallery">
        
        <div class="card" onclick="openProduct('Змейка', 'Змейка_синий.png', 'Змейка_красный.png', 'Змейка_зеленый.png')">
            <img src="Ящерица.png"> <div class="info"><span>Змейка</span><span>120 ₽</span></div>
        </div>

        <div class="card" onclick="openProduct('Осминог', 'Осминог_синий.png', 'Осминог_красный.png', 'Осминог_зеленый.png')">
            <img src="Осмног.png"> <div class="info"><span>Осминог</span><span>120 ₽</span></div>
        </div>

        <div class="card" onclick="openProduct('Скелет', 'Скелет_синий.png', 'Скелет_красный.png', 'Скелет_зеленый.png')">
            <img src="Скелет (2).png"> <div class="info"><span>Скелет</span><span>120 ₽</span></div>
        </div>

    </div>

    <div id="box" class="modal">
        <div class="modal-content">
            <h2 id="name">Название</h2>
            <img id="bigImage" src="">
            
            <div class="colors">
                <div class="dot" style="background: blue;" onclick="changeImg(1)"></div>
                <div class="dot" style="background: red;" onclick="changeImg(2)"></div>
                <div class="dot" style="background: green;" onclick="changeImg(3)"></div>
            </div>

            <div class="close" onclick="closeBox()">Закрыть</div>
        </div>
    </div>

    <script>
        let img1, img2, img3; // Переменные для хранения путей к картинкам

        function openProduct(title, blue, red, green) {
            document.getElementById('name').innerText = title;
            // Запоминаем картинки для этого товара
            img1 = blue; 
            img2 = red; 
            img3 = green;

            // Сразу ставим СИНЮЮ картинку (img1)
            document.getElementById('bigImage').src = img1;
            document.getElementById('box').style.display = 'flex';
        }

        function changeImg(num) {
            if(num == 1) document.getElementById('bigImage').src = img1;
            if(num == 2) document.getElementById('bigImage').src = img2;
            if(num == 3) document.getElementById('bigImage').src = img3;
        }

        function closeBox() {
            document.getElementById('box').style.display = 'none';
        }
    </script>
</body>
</html>
