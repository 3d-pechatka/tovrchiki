<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Галерея товаров</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header img {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        h1 { font-size: 1.4rem; margin: 0; }

        .gallery {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .item-card img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #334155;
        }

        .item-details {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .item-price {
            color: var(--accent-color);
            font-weight: 800;
            font-size: 1.2rem;
        }

        footer {
            margin: 40px 0;
            color: #475569;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://r.jina.ai/i/9e000407f6be4e6eb9da932267f815be" alt="Logo">
        <h1>Наши работы</h1>
    </header>

    <div class="gallery">

        <div class="item-card">
            <img src="photo1.jpg" alt="Товар 1">
            <div class="item-details">
                <div class="item-name">Название товара 1</div>
                <div class="item-price">1 200 ₽</div>
            </div>
        </div>

        <div class="item-card">
            <img src="photo2.jpg" alt="Товар 2">
            <div class="item-details">
                <div class="item-name">Название товара 2</div>
                <div class="item-price">850 ₽</div>
            </div>
        </div>

        <div class="item-card">
            <img src="photo3.jpg" alt="Товар 3">
            <div class="item-details">
                <div class="item-name">Название товара 3</div>
                <div class="item-price">2 500 ₽</div>
            </div>
        </div>

    </div>

    <footer>
        &copy; 2026 3D Pechatka Studio
    </footer>

</body>
</html>
