<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Premium Showcase</title>
    <style>
        :root {
            --primary: #38bdf8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 2.2rem;
            margin: 40px 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 25px; }

        .item-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .item-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .item-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }

        .item-info {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }

        .item-name { font-size: 1.2rem; font-weight: 600; }

        .price-tag {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: 800;
        }

        /* МОДАЛКА */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--border);
        }

        #modalImg {
            width: 100%;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px solid var(--primary);
        }

        .color-selector { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px var(--primary); }

        .close-btn {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Ассортимент</h1>

    <div class="container">
        
        <div class="item-card" onclick="showProduct('Змейка', 'Ящерица (2).png', 'Ящерица_красная.png', 'Ящерица_зеленая.png')">
            <img src="Ящерица (2).png">
            <div class="item-info">
                <span class="item-name">Змейка</span>
                <div class="price-tag">120 ₽</div>
            </div>
        </div>

        <div class="item-card" onclick="showProduct('Осминог', 'Осмног.png', 'Осминог_красный.png', 'Осминог_зеленый.png')">
            <img src="Осмног.png">
            <div class="item-info">
                <span class="item-name">Осминог</span>
                <div class="price-tag">120 ₽</div>
            </div>
        </div>

        <div class="item-card" onclick="showProduct('Скелет', 'Скелет (2).png', 'Скелет_красный.png', 'Скелет_зеленый.png')">
            <img src="Скелет (2).png">
            <div class="item-info">
                <span class="item-name">Скелет</span>
                <div class="price-tag">120 ₽</div>
            </div>
        </div>

    </div>

    <div id="productModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalName" style="margin:0">Название</h2>
            <img id="modalImg" src="">
            
            <div class="color-selector">
                <div class="dot active" style="background: #3b82f6;" onclick="setImg(0, this)"></div>
                <div class="dot" style="background: #ef4444;" onclick="setImg(1, this)"></div>
                <div class="dot" style="background: #22c55e;" onclick="setImg(2, this)"></div>
            </div>

            <button class="close-btn" onclick="closeModal(null)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let currentPhotos = [];

        function showProduct(name, blue, red, green) {
            // Записываем пути к фото
            currentPhotos = [blue, red, green];
            document.getElementById('modalName').innerText = name;
            
            // Сбрасываем активную точку на синий (первый)
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            dots[0].classList.add('active');

            // Показываем модалку и ставим синее фото
            document.getElementById('modalImg').src = currentPhotos[0];
            document.getElementById('productModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function setImg(index, el) {
            // Меняем фото по клику на точку
            document.getElementById('modalImg').src = currentPhotos[index];
            
            // Управляем активным классом точек
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function closeModal(e) {
            if (!e || e.target.id === 'productModal' || e.target.className === 'close-btn') {
                document.getElementById('productModal').style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
