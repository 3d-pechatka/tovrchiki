<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Витрина</title>
    <style>
        /* 1. ОБЩИЕ СТИЛИ */
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 30px; font-weight: 300; }

        /* 2. КАРТОЧКИ ТОВАРОВ */
        .container { width: 100%; max-width: 450px; }

        .item-card {
            background: #1e293b;
            border-radius: 20px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.2s;
        }

        .item-card:active { transform: scale(0.98); }

        .item-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
        }

        .item-info {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .price { color: #38bdf8; font-weight: bold; font-size: 1.2rem; }

        /* 3. ВСПЛЫВАЮЩЕЕ ОКНО (МОДАЛКА) */
        .modal {
            display: none; /* Скрыто по умолчанию */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        #modalImg {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid #38bdf8;
        }

        /* Кнопки выбора цвета */
        .color-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .dot {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
            transition: 0.2s;
        }

        .dot:hover { transform: scale(1.1); }

        .close-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Ассортимент</h1>

    <div class="container">
        
        <div class="item-card" onclick="showProduct('Змейка', '120 ₽', 'Ящерица.png', 'Ящерица_красная.png', 'Ящерица_зеленая.png')">
            <img src="Ящерица.png" alt="Обложка">
            <div class="item-info">
                <span>Змейка</span>
                <span class="price">120 ₽</span>
            </div>
        </div>

        <div class="item-card" onclick="showProduct('Осминог', '120 ₽', 'Осминог.png', 'Осминог_красный.png', 'Осминог_зеленый.png')">
            <img src="Осмног.png" alt="Обложка">
            <div class="item-info">
                <span>Осминог</span>
                <span class="price">120 ₽</span>
            </div>
        </div>

        <div class="item-card" onclick="showProduct('Скелет', '120 ₽', 'Скелет.png', 'Скелет_красный.png', 'Скелет_зеленый.png')">
            <img src="Скелет (2).png" alt="Обложка">
            <div class="item-info">
                <span>Скелет</span>
                <span class="price">120 ₽</span>
            </div>
        </div>

    </div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <h2 id="modalName">Название</h2>
            <img id="modalImg" src="" alt="Товар">
            
            <div class="color-selector">
                <div class="dot" style="background: #3b82f6;" onclick="setImg(0)"></div> <div class="dot" style="background: #ef4444;" onclick="setImg(1)"></div> <div class="dot" style="background: #22c55e;" onclick="setImg(2)"></div> </div>

            <div class="close-link" onclick="closeModal()">Закрыть</div>
        </div>
    </div>

    <script>
        let currentProductPhotos = [];

        function showProduct(name, price, blue, red, green) {
            // Сохраняем пути к фото в массив
            currentProductPhotos = [blue, red, green];
            
            document.getElementById('modalName').innerText = name;
            
            // Устанавливаем СИНЕЕ фото (индекс 0) при открытии
            setImg(0);
            
            document.getElementById('productModal').style.display = 'flex';
        }

        function setImg(index) {
            // Меняем картинку в модалке
            document.getElementById('modalImg').src = currentProductPhotos[index];
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        // Закрытие при клике вне контента
        window.onclick = function(event) {
            let modal = document.getElementById('productModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
