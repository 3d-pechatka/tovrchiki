<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Каталог</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        header img {
            width: 120px;
            height: 120px;
            border-radius: 20px; /* Скругленные углы под стиль логотипа */
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px; }

        .product-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: transform 0.2s, background 0.2s;
        }

        .product-card:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.15);
        }

        .product-img {
            width: 50px;
            height: 50px;
            background: #1e293b;
            border-radius: 10px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .product-info { text-align: left; }
        .product-info h3 { margin: 0; font-size: 1.1rem; }
        .product-info span { font-size: 0.85rem; color: var(--accent-color); font-weight: bold; }

        footer { margin-top: 50px; font-size: 0.8rem; color: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://r.jina.ai/i/9e000407f6be4e6eb9da932267f815be" alt="3D Pechatka Logo">
            <h1>3D Pechatka Studio</h1>
            <p>Печать из PETG, 3D моделирование и дизайн</p>
        </header>

        <div class="product-list">
            <a href="#" class="product-card">
                <div class="product-img">🦊</div>
                <div class="product-info">
                    <h3>Подвижные фигурки</h3>
                    <span>от 350 ₽</span>
                </div>
            </a>

            <a href="#" class="product-card">
                <div class="product-img">⌚</div>
                <div class="product-info">
                    <h3>Держатель для зарядки</h3>
                    <span>600 ₽</span>
                </div>
            </a>

            <a href="https://avito.ru" class="product-card" style="border-color: var(--accent-color);">
                <div class="product-img">📦</div>
                <div class="product-info">
                    <h3>Заказать на Avito</h3>
                    <span>Посмотреть все товары</span>
                </div>
            </a>
        </div>

        <footer>
            &copy; 2026 3D Pechatka. Отсканируйте для заказа.
        </footer>
    </div>

</body>
</html>
