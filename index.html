<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Premium Showcase</title>
    <style>
        /* 1. БАЗОВЫЕ НАСТРОЙКИ И ФОН */
        :root {
            --primary: #38bdf8;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { 
            font-size: 2.2rem;
            font-weight: 700;
            margin: 40px 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 2. КОНТЕЙНЕР И ЖИВЫЕ КАРТОЧКИ */
        .container { 
            width: 100%; 
            max-width: 480px; 
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Эффект при наведении */
        .item-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }

        .item-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            transition: 0.5s;
        }

        /* 3. БЛОК ЦЕНЫ И ИНФОРМАЦИИ */
        .item-info {
            padding: 20px;
            background: linear-gradient(to top, rgba(15,23,42,0.8), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Выделенная рамка над ценой */
        .price-tag {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        /* 4. УЛУЧШЕННОЕ МОДАЛЬНОЕ ОКНО */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 20px;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: #1e293b;
            width: 100%;
            max-width: 420px;
            padding: 25px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        #modalImg {
            width: 100%;
            border-radius: 20px;
            margin: 20px 0;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        /* Селектор цветов */
        .color-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .dot {
            width: 40px;
            height: 40px;
            border-radius: 14px; /* Квадратные со скруглением выглядят современнее */
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            position: relative;
        }

        .dot:hover { transform: translateY(-3px); }
        .dot.active { border-color: white; box-shadow: 0 0 15px var(--primary); }

        .close-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: #94a3b8;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .close-btn:hover { background: rgba(255,255,255,0.1); color: white; }

    </style>
</head>
<body>

    <h1>Ассортимент</h1>

    <div class="container">
        
        <div class="item-card" onclick="showProduct('Змейка', 'Ящерица.png', 'Ящерица_красная.png', 'Ящерица_зеленая.png')">
            <img src="Ящерица.png" alt="Product">
            <div class="item-info">
                <span class="item-name">Змейка</span>
                <div class="price-tag">120 ₽</div>
            </div>
        </div>

        <div class="item-card" onclick="showProduct('Осминог', 'Осмног.png', 'Осминог_красный.png', 'Осминог_зеленый.png')">
            <img src="Осмног.png" alt="Product">
            <div class="item-info">
                <span class="item-name">Осминог</span>
                <div class="price-tag">120 ₽</div>
            </div>
        </div>

        <div class="item-card" onclick="showProduct('Скелет', 'Скелет (2).png', 'Скелет_красный.png', 'Скелет_зеленый.png')">
            <img src="Скелет (2).png" alt="Product">
            <div class="item-info">
                <span class="item-name">Скелет</span>
                <div class="price-tag">120 ₽</div>
            </div>
        </div>

    </div>

    <div id="productModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalName" style="margin: 0; font-size: 1.5rem;">Название</h2>
            <img id="modalImg" src="" alt="View">
            
            <div class="color-selector">
                <div class="dot" style="background: #3b82f6;" onclick="setImg(0, this)"></div>
                <div class="dot" style="background: #ef4444;" onclick="setImg(1, this)"></div>
                <div class="dot" style="background: #22c55e;" onclick="setImg(2, this)"></div>
            </div>

            <button class="close-btn" onclick="closeModal(null)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        let currentPhotos = [];

        function showProduct(name, img1, img2, img3) {
            currentPhotos = [img1, img2, img3];
            document.getElementById('modalName').innerText = name;
            
            // Сброс активной точки и установка первой картинки
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            dots[0].classList.add('active');

            setImg(0, dots[0]);
            
            document.getElementById('productModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Запрет прокрутки
        }

        function setImg(index, el) {
            document.getElementById('modalImg').src = currentPhotos[index];
            
            // Переключение рамки у точек
            const dots = document.querySelectorAll('.dot');
            dots.forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        function closeModal(e) {
            if (!e || e.target.id === 'productModal' || e.target.className === 'close-btn') {
                document.getElementById('productModal').style.display = 'none';
