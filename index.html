<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pechatka | Ассортимент</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
            --modal-bg: rgba(15, 23, 42, 0.95);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin: 20px 0 40px;
        }

        h1 { font-size: 1.8rem; letter-spacing: 1px; }

        .gallery {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .item-card:active { transform: scale(0.98); }

        .item-card img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .item-details {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .item-name { font-size: 1.1rem; font-weight: 600; }
        .item-price { color: var(--accent-color); font-weight: 800; font-size: 1.2rem; }

        /* Стили модального окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-bg);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 2rem;
            color: #64748b;
            cursor: pointer;
            line-height: 1;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .color-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .color-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .color-name { font-size: 0.8rem; color: #94a3b8; }

        footer { margin: 50px 0; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>Ассортимент</h1>
    </header>

    <div class="gallery">
        <div class="item-card" onclick="openModal('Змейка', ['Зеленый', 'Красный', 'Синий'], ['#22c55e', '#000000', '#fbbf24'])">
            <img src="Ящерица.png" alt="Змейка">
            <div class="item-details">
                <div class="item-name">Змейка</div>
                <div class="item-price">120 ₽</div>
            </div>
        </div>

        <div class="item-card" onclick="openModal('Осминог', ['Зеленый', 'Красный', 'Синий'], ['#3b82f6', '#ffffff', '#ef4444'])">
            <img src="Осмног.png" alt="Осминог">
            <div class="item-details">
                <div class="item-name">Осминог</div>
                <div class="item-price">120 ₽</div>
            </div>
        </div>

        <div class="item-card" onclick="openModal('Скелет', ['Зеленый', 'Красный', 'Синий'], ['#ccff00', '#94a3b8'])">
            <img src="Скелет (2).png" alt="Скелет">
            <div class="item-details">
                <div class="item-name">Скелет</div>
                <div class="item-price">120 ₽</div>
            </div>
        </div>
    </div>

    <div id="colorModal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Цвета</h2>
            <p style="color: #94a3b8;">Доступно для заказа:</p>
            <div id="colorList" class="color-grid">
                </div>
        </div>
    </div>

    <footer>
        &copy; 2026 3D Pechatka Studio
    </footer>

    <script>
        function openModal(name, colors, hexes) {
            document.getElementById('modalTitle').innerText = name;
            const list = document.getElementById('colorList');
            list.innerHTML = ''; // Очистить старое

            colors.forEach((color, index) => {
                const item = document.createElement('div');
                item.className = 'color-item';
                item.innerHTML = `
                    <div class="color-circle" style="background-color: ${hexes[index]}"></div>
                    <div class="color-name">${color}</div>
                `;
                list.appendChild(item);
            });

            document.getElementById('colorModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('colorModal').style.display = 'none';
        }
    </script>
</body>
</html>
